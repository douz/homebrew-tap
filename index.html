<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>douz Homebrew Tap</title>
  <style>
    body{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f8f7;color:#102019;margin:0}
    main{max-width:900px;margin:0 auto;padding:36px 20px}
    h1{margin:0 0 10px}
    .card{background:#fff;border:1px solid #d7e5df;border-radius:12px;padding:18px;margin-top:16px}
    code{background:#edf5f1;border:1px solid #d7e5df;border-radius:6px;padding:2px 6px}
    pre{background:#0f2119;color:#eafff4;border-radius:10px;padding:12px;overflow:auto}
    a{color:#0a8b56;text-decoration:none}a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main>
    <h1>douz Homebrew Tap</h1>
    <p>Canonical tap documentation for packages published by <a href="https://github.com/douz">@douz</a>.</p>
    <p>Domain: <code>brew.douz.io</code> · Repo: <a href="https://github.com/douz/homebrew-tap">douz/homebrew-tap</a></p>
    <section class="card">
      <h2>Install tap</h2>
      <pre>brew tap douz/tap</pre>
    </section>
    <section class="card">
      <h2>Install mac-motd</h2>
      <pre>brew install mac-motd
mac-motd install</pre>
      <p>Source: <a href="https://github.com/douz/mac-motd">douz/mac-motd</a></p>
    </section>
  </main>
</body>
</html>
